<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f9b4c8">
<title>For My Love 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --rose: #e8436a;
    --blush: #f9b4c8;
    --deep: #7a1535;
    --muted: #c0405c;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }

  body {
    font-family: 'Lora', serif;
    background: #ffb3cc;
    position: relative;
    touch-action: none;
  }

  /* ── ANIMATED BG ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(160deg, #ffe0ec 0%, #ffb3cc 35%, #ff8fab 65%, #e8436a 100%);
    background-size: 300% 300%;
    animation: bgShift 14s ease infinite;
  }
  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .glow {
    position: fixed; border-radius: 50%;
    filter: blur(70px); pointer-events: none; z-index: 1;
    mix-blend-mode: screen;
  }

  #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  /* ══════════ LOGIN ══════════ */
  #loginScreen {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: calc(var(--safe-top) + 1rem) 1.4rem calc(var(--safe-bot) + 1rem);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #loginScreen.out { opacity: 0; transform: scale(0.95) translateY(-20px); pointer-events: none; }

  .lock-anim {
    font-size: 3.8rem; margin-bottom: 1.4rem; display: block;
    animation: lockPulse 2.2s ease-in-out infinite;
    filter: drop-shadow(0 4px 16px rgba(122,21,53,0.35));
  }
  @keyframes lockPulse {
    0%,100% { transform: scale(1) rotate(-4deg); }
    50%     { transform: scale(1.14) rotate(4deg); }
  }

  .card {
    width: 100%; max-width: 370px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 28px;
    padding: 2.4rem 1.8rem 2rem;
    text-align: center;
    box-shadow: 0 24px 64px rgba(220,60,100,0.2), 0 0 0 1px rgba(255,255,255,0.4) inset;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem; color: var(--deep);
    line-height: 1.25; margin-bottom: 0.4rem;
  }
  .card-sub {
    font-size: 0.93rem; color: var(--muted);
    font-style: italic; margin-bottom: 1.8rem;
  }

  .pw-wrap { position: relative; margin-bottom: 1.2rem; }
  .pw-wrap input {
    width: 100%;
    padding: 16px 18px;
    font-family: 'Lora', serif;
    font-size: 1rem; color: var(--deep);
    background: rgba(255,255,255,0.9);
    border: 2px solid rgba(232,67,106,0.22);
    border-radius: 16px; outline: none;
    text-align: center; letter-spacing: 0.12em;
    -webkit-appearance: none; appearance: none;
    transition: border 0.3s, box-shadow 0.3s;
  }
  .pw-wrap input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 4px rgba(232,67,106,0.14);
  }
  .pw-wrap input::placeholder { color: #d4a0b4; font-style: italic; }

  .unlock-btn {
    width: 100%; padding: 17px;
    background: linear-gradient(135deg, #e8436a 0%, #7a1535 100%);
    color: #fff; border: none; border-radius: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 10px 28px rgba(122,21,53,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-appearance: none; appearance: none;
  }
  .unlock-btn:active { transform: scale(0.97); box-shadow: 0 6px 18px rgba(122,21,53,0.3); }

  .err {
    margin-top: 1rem; min-height: 1.3em;
    color: var(--rose); font-size: 0.9rem; font-style: italic;
  }
  .err.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-10px)} 40%{transform:translateX(10px)}
    60%{transform:translateX(-7px)}  80%{transform:translateX(7px)}
  }

  /* ══════════ CONTENT ══════════ */
  #contentScreen {
    position: fixed; inset: 0; z-index: 15;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: calc(var(--safe-top) + 1.5rem) 1.5rem calc(var(--safe-bot) + 5rem);
    text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #contentScreen.in { opacity: 1; pointer-events: auto; }

  /* photo */
  .photo-ring-wrap {
    position: relative;
    width: min(54vw, 210px); height: min(54vw, 210px);
    margin-bottom: 1.5rem;
    opacity: 0; transform: scale(0.85);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .photo-ring-wrap.show { opacity: 1; transform: scale(1); }

  .photo-ring-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 50%;
    border: 5px solid rgba(255,255,255,0.85);
    box-shadow: 0 0 0 3px var(--blush), 0 16px 48px rgba(122,21,53,0.3);
    display: block;
  }
  .ring {
    position: absolute; inset: -10px; border-radius: 50%;
    border: 2px dashed rgba(232,67,106,0.45);
    animation: spin 14s linear infinite;
  }
  .ring2 {
    position: absolute; inset: -20px; border-radius: 50%;
    border: 1px dashed rgba(232,67,106,0.2);
    animation: spin 22s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* texts */
  .main-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.55rem, 7.5vw, 2.4rem);
    color: var(--deep); line-height: 1.3;
    text-shadow: 0 2px 16px rgba(122,21,53,0.15);
    max-width: 320px; white-space: pre-line;
    opacity: 0; transform: translateY(22px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .main-text.show { opacity: 1; transform: translateY(0); }

  .sub-text {
    font-family: 'Lora', serif;
    font-size: clamp(1rem, 4.5vw, 1.25rem);
    color: #bf4060; font-style: italic;
    margin-top: 0.8rem; max-width: 300px;
    line-height: 1.6;
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.8s ease 0.35s, transform 0.8s ease 0.35s;
  }
  .sub-text.show { opacity: 1; transform: translateY(0); }

  /* final */
  .final-card {
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1.5px solid rgba(255,255,255,0.8);
    border-radius: 26px;
    padding: 2rem 1.6rem 1.8rem;
    max-width: 350px; width: 100%;
    box-shadow: 0 20px 60px rgba(220,60,100,0.2);
    opacity: 0; transform: translateY(28px) scale(0.97);
    transition: opacity 1s ease, transform 1s ease;
    display: none;
  }
  .final-card.show { opacity: 1; transform: translateY(0) scale(1); }

  .camellia {
    font-size: 2.8rem; display: block; margin-bottom: 0.9rem;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }

  .final-card h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 5.5vw, 1.8rem);
    color: var(--deep); line-height: 1.35; margin-bottom: 0.9rem;
  }
  .final-card p {
    font-size: clamp(0.92rem, 4vw, 1.08rem);
    color: #9e3054; font-style: italic; line-height: 1.75;
  }

  /* ── FLOATING HEARTS ── */
  .hf {
    position: fixed; pointer-events: none; z-index: 6;
    animation: floatUp linear forwards;
    line-height: 1; user-select: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-115vh) scale(0.5) rotate(20deg); opacity: 0; }
  }

  /* ── PETALS ── */
  .pt {
    position: fixed; pointer-events: none; z-index: 5;
    animation: petalFall linear forwards;
  }
  @keyframes petalFall {
    0%   { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(108vh) translateX(50px) rotate(400deg); opacity: 0.2; }
  }

  /* ── PROGRESS ── */
  .progress {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.2);
    z-index: 50;
    padding-bottom: var(--safe-bot);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blush), var(--rose), var(--deep));
    width: 0%; transition: width 1s linear;
    border-radius: 0 3px 3px 0;
  }

  /* ── MUSIC PILL ── */
  .music-pill {
    position: fixed;
    bottom: calc(var(--safe-bot) + 14px);
    left: 50%; transform: translateX(-50%);
    z-index: 40;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.75);
    border-radius: 40px;
    padding: 10px 20px;
    font-family: 'Lora', serif;
    font-size: 0.85rem; color: var(--deep);
    opacity: 0; transition: opacity 0.5s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(122,21,53,0.15);
  }
  .music-pill.show { opacity: 1; }

  .viz { display: flex; align-items: flex-end; gap: 3px; height: 18px; }
  .vb {
    width: 3px; border-radius: 2px;
    background: linear-gradient(to top, var(--rose), var(--blush));
    animation: vibe 0.5s ease-in-out infinite alternate;
  }
  @keyframes vibe { from{height:3px} to{height:var(--h,14px)} }

  /* ── TAP TO PLAY (fallback) ── */
  .tap-btn {
    position: fixed;
    top: calc(var(--safe-top) + 14px); right: 16px; z-index: 60;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 40px; padding: 10px 18px;
    font-family: 'Lora', serif; font-size: 0.85rem; color: var(--deep);
    cursor: pointer; display: none;
    box-shadow: 0 4px 16px rgba(122,21,53,0.15);
    -webkit-appearance: none; transition: transform 0.15s;
  }
  .tap-btn:active { transform: scale(0.95); }

  /* ── RIPPLE ── */
  .rip {
    position: fixed; border-radius: 50%;
    background: rgba(232,67,106,0.22);
    pointer-events: none; z-index: 3;
    transform: scale(0);
    animation: ripOut 0.75s ease-out forwards;
  }
  @keyframes ripOut { to { transform: scale(5); opacity: 0; } }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="glow" style="width:320px;height:320px;top:-80px;left:-80px;background:rgba(255,180,210,0.4);"></div>
<div class="glow" style="width:260px;height:260px;bottom:-60px;right:-60px;background:rgba(255,100,140,0.35);"></div>
<canvas id="particles"></canvas>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <span class="lock-anim">🔐</span>
  <div class="card">
    <h2 class="card-title">A Secret<br>Just For You 💌</h2>
    <p class="card-sub">Enter the password to unlock your surprise…</p>
    <div class="pw-wrap">
      <input
        type="password"
        id="passInput"
        placeholder="✦ your secret code ✦"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter'){this.blur();checkPassword();}"
      >
    </div>
    <button class="unlock-btn" onclick="checkPassword()">Unlock My Heart 💖</button>
    <p class="err" id="errMsg"></p>
  </div>
</div>

<!-- ══ CONTENT ══ -->
<div id="contentScreen">
  <div class="photo-ring-wrap" id="photoWrap" style="display:none">
    <div class="ring"></div>
    <div class="ring2"></div>
    <img id="photoImg" src="" alt="">
  </div>
  <p class="main-text" id="mainText"></p>
  <p class="sub-text"  id="subText"></p>
  <div class="final-card" id="finalCard">
    <span class="camellia">🌹</span>
    <h1>Once again,<br>Happy Birthday My Love ❤️</h1>
    <p>
      Smile always 😊🥰<br>
      because your smile is like a<br>
      <em>Middlemist's Red Camellia</em> —<br>
      rare, breathtaking, and the most<br>
      beautiful thing in the whole world. 💕
    </p>
  </div>
</div>

<!-- UI chrome -->
<div class="progress"><div class="progress-fill" id="progFill"></div></div>
<div class="music-pill" id="musicPill">
  <div class="viz" id="viz"></div>
  <span>🎵 Playing for you…</span>
</div>
<button class="tap-btn" id="tapBtn" onclick="resumeAudio()">▶ Tap to play 🎵</button>

<!-- AUDIO — replace "your-song.mp3" with your audio file name -->
<audio id="bgMusic" src="your-song.mp3" preload="auto" playsinline webkit-playsinline></audio>

<script>
/* ═════════════════════════════════
   CONFIG — edit these values
═════════════════════════════════ */
const PASSWORD      = "queen of your heart";
const TOTAL_SECONDS = 60; // change to your song's length in seconds

/*
  TIMELINE:
  - `at`   = seconds from start when this slide appears
  - `main` = big text (use \n for line breaks)
  - `sub`  = smaller italic text below
  - `img`  = filename of your photo (place in same folder as index.html)
  - `final:true` = shows the closing love message card
*/
const TIMELINE = [
  { at: 0,  main: "🎂 Happy Birthday\nMy Love ❤️",        sub: null,                               img: null        },
  { at: 3,  main: "🎂 Happy Birthday\nMy Love ❤️",        sub: "I Love You Papa 💖",                img: null        },
  { at: 7,  main: "You are my\neverything ❤️",             sub: "Every heartbeat, every breath…",   img: "image1.jpg" },
  { at: 14, main: "Your smile makes\nmy world shine ✨",   sub: "No star compares to you…",         img: "image2.jpg" },
  { at: 21, main: "Every moment\nwith you is special 💕", sub: "Time stands still near you…",      img: "image3.jpg" },
  { at: 28, main: "You are the\nmelody of my life 🎵",    sub: "This song plays for you alone…",   img: "image4.jpg" },
  { at: 35, main: "My heart belongs\nonly to you 💓",     sub: "Forever and always…",              img: "image5.jpg" },
  { at: 42, main: "Thank you for\nbeing my world 🌸",     sub: "I am so lucky to love you…",       img: "image6.jpg" },
  { at: TOTAL_SECONDS - 4, final: true },
];

/* ═════════════════════════════════
   PASSWORD CHECK
═════════════════════════════════ */
function checkPassword() {
  const val = document.getElementById("passInput").value.trim().toLowerCase();
  const err = document.getElementById("errMsg");
  if (val === PASSWORD) {
    document.getElementById("loginScreen").classList.add("out");
    setTimeout(startExperience, 700);
  } else {
    err.textContent = "Wrong password… try again 😜";
    err.classList.remove("shake");
    void err.offsetWidth;
    err.classList.add("shake");
  }
}

/* ═════════════════════════════════
   PARTICLES
═════════════════════════════════ */
(function() {
  const c   = document.getElementById("particles");
  const ctx = c.getContext("2d");
  let dots  = [];
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener("resize", resize);
  for (let i = 0; i < 40; i++) dots.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: 1 + Math.random() * 2,
    dx: (Math.random() - 0.5) * 0.3,
    dy: -0.15 - Math.random() * 0.25,
    a: 0.2 + Math.random() * 0.4
  });
  (function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    dots.forEach(d => {
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,80,130,${d.a})`; ctx.fill();
      d.x += d.dx; d.y += d.dy;
      if (d.y < -10) { d.y = c.height + 10; d.x = Math.random() * c.width; }
    });
    requestAnimationFrame(draw);
  })();
})();

/* ═════════════════════════════════
   HEARTS & PETALS
═════════════════════════════════ */
const HE = ["💖","💗","💓","💕","💞","🌸","🌷","✨","💝","💘"];
function spawnHeart() {
  const h = document.createElement("div"); h.className = "hf";
  h.textContent = HE[Math.floor(Math.random() * HE.length)];
  h.style.left = Math.random() * 92 + "vw";
  h.style.bottom = "-30px";
  h.style.fontSize = (12 + Math.random() * 16) + "px";
  const d = 4 + Math.random() * 4;
  h.style.animationDuration = d + "s";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), d * 1000);
}
function spawnPetal() {
  const p = document.createElement("div"); p.className = "pt";
  p.textContent = ["🌸","🌺","🌷","🌹"][Math.floor(Math.random() * 4)];
  p.style.left = Math.random() * 92 + "vw";
  p.style.top = "-20px";
  p.style.fontSize = (11 + Math.random() * 10) + "px";
  const d = 5 + Math.random() * 5;
  p.style.animationDuration = d + "s";
  document.body.appendChild(p);
  setTimeout(() => p.remove(), d * 1000);
}

/* ═════════════════════════════════
   TOUCH RIPPLE
═════════════════════════════════ */
document.addEventListener("touchstart", e => {
  const t = e.touches[0];
  const r = document.createElement("div"); r.className = "rip";
  r.style.width = r.style.height = "60px";
  r.style.left = (t.clientX - 30) + "px";
  r.style.top  = (t.clientY - 30) + "px";
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 750);
}, { passive: true });

/* ═════════════════════════════════
   AUDIO
═════════════════════════════════ */
const music = document.getElementById("bgMusic");

async function tryPlay() {
  try {
    await music.play();
    buildViz();
    document.getElementById("tapBtn").style.display = "none";
    document.getElementById("musicPill").classList.add("show");
  } catch(e) {
    document.getElementById("tapBtn").style.display = "block";
  }
}
function resumeAudio() {
  music.play().then(() => {
    buildViz();
    document.getElementById("tapBtn").style.display = "none";
    document.getElementById("musicPill").classList.add("show");
  });
}
function buildViz() {
  const w = document.getElementById("viz"); w.innerHTML = "";
  for (let i = 0; i < 12; i++) {
    const b = document.createElement("div"); b.className = "vb";
    b.style.setProperty("--h", (5 + Math.random() * 13) + "px");
    b.style.animationDuration = (0.3 + Math.random() * 0.5) + "s";
    b.style.animationDelay   = (Math.random() * 0.3) + "s";
    w.appendChild(b);
  }
}

/* ═════════════════════════════════
   TEXT / PHOTO
═════════════════════════════════ */
function showText(main, sub) {
  const m = document.getElementById("mainText");
  const s = document.getElementById("subText");
  m.classList.remove("show"); s.classList.remove("show");
  setTimeout(() => {
    if (main !== null && main !== undefined) {
      m.textContent = main;
      requestAnimationFrame(() => requestAnimationFrame(() => m.classList.add("show")));
    }
    s.textContent = sub || "";
    if (sub) requestAnimationFrame(() => requestAnimationFrame(() => s.classList.add("show")));
  }, 350);
}
function showPhoto(src) {
  const wrap = document.getElementById("photoWrap");
  const img  = document.getElementById("photoImg");
  if (!src) { wrap.style.display = "none"; wrap.classList.remove("show"); return; }
  img.src = src;
  wrap.style.display = "block";
  requestAnimationFrame(() => requestAnimationFrame(() => wrap.classList.add("show")));
}
function showFinal() {
  document.getElementById("mainText").style.opacity = "0";
  document.getElementById("subText").style.opacity  = "0";
  document.getElementById("photoWrap").style.display = "none";
  const f = document.getElementById("finalCard");
  f.style.display = "block";
  requestAnimationFrame(() => requestAnimationFrame(() => f.classList.add("show")));
  for (let i = 0; i < 10; i++) setTimeout(spawnHeart, i * 110);
}

/* ═════════════════════════════════
   PROGRESS
═════════════════════════════════ */
function startProgress() {
  let t = 0;
  const fill = document.getElementById("progFill");
  setInterval(() => {
    t++;
    fill.style.width = Math.min(100, (t / TOTAL_SECONDS) * 100) + "%";
  }, 1000);
}

/* ═════════════════════════════════
   MAIN EXPERIENCE
═════════════════════════════════ */
function startExperience() {
  document.getElementById("contentScreen").classList.add("in");
  const hi = setInterval(spawnHeart,  600);
  const pi = setInterval(spawnPetal, 1400);
  startProgress();

  TIMELINE.forEach(step => {
    setTimeout(() => {
      if (step.final) {
        showFinal();
        clearInterval(hi); clearInterval(pi);
        setInterval(spawnHeart, 2500);
        setInterval(spawnPetal, 3500);
      } else {
        showText(step.main, step.sub);
        if ("img" in step) showPhoto(step.img);
      }
    }, step.at * 1000);
  });

  // audio starts after first animations settle
  setTimeout(tryPlay, 6500);
}
</script>
</body>
